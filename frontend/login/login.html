<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录界面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="center">
        
        <div class="brand" >
                <h1 >CODEFETCH</h1>
        </div>
        
        <section class="card" aria-labelledby="brand" >
            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="email">邮 箱</label>
                    <input  id="email" class="input" type="email" placeholder="邮箱地址" required/>
                    <div id="emailerr" class="wrong hidden" role="alert" aria-live="polite" aria-hidden="true"></div>
                </div>
                <div class="field">
                    <div class="row" style="justify-content:space-between">
                        <label for="password">密 码</label>
                        <button type="button" id="visibtn" class="visiblebtn" aria-controls="password">显示</button>
                    </div>
                    <input id="password" class="input" type="password" placeholder="请输入密码" required/>
                    <div class="row">
                        <a style="font-size: 15px;margin-left: auto;" href="#" id="forgotPasswordLink" class="muted" aria-label="忘记密码">忘记密码?</a>
                    </div>
                    <div id="passerr" class="wrong hidden" role="alert" aria-live="polite" aria-hidden="true"></div>
                </div>
                
                <div style="margin-top:18px">
                    <button type="submit" class="btn" style="font-size: 15px;">登录</button>
                </div>
                <div style="margin-top:10px; text-align: center;">
                    <a href="../register/register.html" style="font-size: 13px;">没有账号？注册一个</a>
                </div>
                
                <div id="formMsg" class="helper hidden" role="status" aria-live="polite" aria-hidden="true"></div>


            </form>
        </section>
        
        <!-- 忘记密码模态框 -->
        <div id="forgotPasswordModal" class="modal hidden">
            <div class="modal-content">
                <span class="close" id="closeModal">&times;</span>
                <h2>找回密码</h2>
                <p>请输入您的注册邮箱，我们将发送密码到您的邮箱。</p>
                <input type="email" id="forgotEmail" placeholder="邮箱地址" required>
                <button id="sendPasswordBtn">发送密码</button>
                <div id="forgotMsg"></div>
            </div>
        </div>
        
    </main>
            
        
    <script type="module" src="script.js"></script>
</body>
</html>
