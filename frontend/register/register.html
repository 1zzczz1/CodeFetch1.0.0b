<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册界面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main class="center">
        
        <div class="brand" >
                <h1 >CODEFETCH</h1>
        </div>
        
        <section class="card" aria-labelledby="brand" >
            <form id="registerForm" novalidate>
                <div class="field">
                    <label for="email">邮 箱</label>
                    <input  id="email" class="input" type="email" placeholder="邮箱地址" required/>
                    <div id="emailerr" class="wrong hidden" role="alert" aria-live="polite" aria-hidden="true"></div>
                </div>
                <div class="field">
                    <div class="row" style="justify-content:space-between">
                        <label for="password">密 码</label>
                        <button type="button" id="visibtn" class="visiblebtn" aria-controls="password">显示</button>
                    </div>
                    <input id="password" class="input" type="password" placeholder="请输入密码" required/>
                    <div id="passerr" class="wrong hidden" role="alert" aria-live="polite" aria-hidden="true"></div>
                </div>
                <div class="field">
                    <div class="row" style="justify-content:space-between">
                        <label for="confirmPassword">确认密码</label>
                        <button type="button" id="visibtn2" class="visiblebtn" aria-controls="confirmPassword">显示</button>
                    </div>
                    <input id="confirmPassword" class="input" type="password" placeholder="请再次输入密码" required/>
                    <div id="confirmerr" class="wrong hidden" role="alert" aria-live="polite" aria-hidden="true"></div>
                </div>
                
                <div style="margin-top:18px">
                    <button type="submit" class="btn" style="font-size: 15px;">注册</button>
                </div>
                <div style="margin-top:10px; text-align: center;">
                    <a href="../login/login.html" style="font-size: 13px;">已有账号？登录</a>
                </div>
                
                <div id="formMsg" class="helper hidden" role="status" aria-live="polite" aria-hidden="true"></div>


            </form>
        </section>
        
    </main>
            
        
    <script src="script.js"></script>
</body>
</html>
