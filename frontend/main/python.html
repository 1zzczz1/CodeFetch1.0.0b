<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFetch - 主界面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- 顶部导航栏 -->
        <header class="top-nav">
            <div class="nav-left">
                <button class="nav-btn active">python</button>
                <button class="nav-btn close-btn" id="add">+</button>
            </div>
            <div class="nav-right">
                <button class="tool-btn" id="refreshBtn" title="刷新">
                    <span class="tool-icon">⟳</span>
                </button>
                <button class="tool-btn" id="favoriteBtn" title="收藏">
                    <span class="tool-icon">☆</span>
                </button>
                <button class="tool-btn" id="shareBtn" title="分享">
                    <span class="tool-icon">↗</span>
                </button>
            </div>
        </header>
        
        <!-- 主内容区和侧边栏 -->
        <div class="main-content-wrapper">
            <!-- 侧边栏导航 -->
            
                <div class="wrap">
            <div class="nav">
                    <div class="header">
                        <div class="avatar-circle"><img src="../picture/头像.jpg" alt=""></div>
                    <div class="title">
                        <p>你好</p>
                        <h1>用户</h1>
                    </div>
                </div>
                <div class="line"></div>
                <div class="btn">
                    <div class="icon">
                        <a href="python.html" >
                    <div class="btn-item"><img src="../picture/python.png" alt=""></div>
                    <div class="description"><h>Python</h></div>
                    </a>
                    </div>
                    <div class="icon">
                        <a href="C++.html" >
                    <div class="btn-item"><img src="../picture/C++.png" alt=""></div>
                    <div class="description"><h>C++</h></div>
                    </a>
                    </div>
                </div>
                <div class="line"></div>
                <div class="icon">
                    <a href="../setting/index.html">
                        <div class="btn-item"><img src="../picture/setting.png" alt=""></div>
                        <div class="description"><h>设置</h></div>
                    </a>
                </div>
            </div>
        </div>
            
            
            <!-- 主内容区 -->
            <main class="main-content">
                <div class="content-header">
                    <h1 class="main-title">这里是python</h1>
                </div>
                
                <!-- 搜索框 -->
                <div class="search-container">
                    <div class="search-box">
                        <input 
                            type="text" 
                            placeholder="搜索代码用法、库、框架等"
                            id="searchInput" 
                            class="search-input"
                        />
                        <button class="search-btn" id="searchBtn">
                            <span class="search-icon">🔍</span>
                        </button>
                    </div>
                    <!-- 搜索联想下拉框（只在 Python 页面使用） -->
                    <div class="search-dropdown" id="searchDropdown" style="display: none;">
                        <ul class="suggestions-list" id="suggestionsList"></ul>
                    </div>
                </div>
                
                <!-- 搜索结果 -->
                <div class="search-results" id="searchResults">
                    <h3 class="results-title">搜索结果</h3>
                    <ul class="results-list" id="resultsList">
                        <!-- 搜索结果将通过JavaScript动态添加 -->
                    </ul>
                </div>
                
                <!-- 回到顶部按钮 -->
                <button class="back-to-top" id="backToTop">
                    <span class="back-icon">↑</span>
                </button>
            </main>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
